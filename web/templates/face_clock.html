{% extends "base.html" %}
{% block title %}Face Clock-In — The Rebar Company{% endblock %}
{% block body %}
<style>
  .page-header { margin-bottom: 28px; text-align: center; }
  .page-header h1 { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 2rem; letter-spacing: 0.04em; }
  .page-header p { color: var(--muted); font-size: 0.9rem; margin-top: 4px; }

  .face-wrap {
    max-width: 520px; margin: 0 auto;
    display: flex; flex-direction: column; align-items: center; gap: 20px;
  }

  .camera-box {
    width: 100%; aspect-ratio: 4/3;
    background: var(--surface); border: 2px solid var(--border);
    border-radius: var(--radius); overflow: hidden; position: relative;
  }

  #video {
    width: 100%; height: 100%; object-fit: cover; display: block;
    transform: scaleX(-1);
  }

  #canvas { display: none; }

  .camera-overlay {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 200px; height: 200px;
    border: 3px solid var(--orange);
    border-radius: 50%;
    pointer-events: none;
    opacity: 0.6;
  }

  #status-box {
    width: 100%; padding: 16px 20px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); text-align: center;
    font-size: 1rem; min-height: 56px;
    display: flex; align-items: center; justify-content: center;
  }

  .btn-capture {
    width: 100%; padding: 16px;
    font-size: 1.2rem; border-radius: var(--radius);
    cursor: pointer; border: none;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800; letter-spacing: 0.08em;
    text-transform: uppercase; transition: all 0.15s;
    background: var(--orange); color: #fff;
  }
  .btn-capture:hover { background: var(--orange-lt); }
  .btn-capture:disabled { background: var(--surface2); color: var(--muted); cursor: not-allowed; }

  .back-link { color: var(--muted); text-decoration: none; font-size: 0.88rem; }
  .back-link:hover { color: var(--text); }
</style>

<main>
  <div class="page-header">
    <h1>Face Clock-In</h1>
    <p>Look at the camera and press Capture to clock in or out</p>
  </div>

  <div class="face-wrap">
    <div class="camera-box">
      <video id="video" autoplay playsinline></video>
      <canvas id="canvas"></canvas>
      <div class="camera-overlay"></div>
    </div>

    <div id="status-box">📷 Starting camera...</div>

    <button class="btn-capture" id="btn-capture" disabled onclick="capture()">
      📸 Capture &amp; Clock In/Out
    </button>

    <a href="{{ url_for('dashboard') }}" class="back-link">← Back to Dashboard</a>
  </div>
</main>

<script>
  const video   = document.getElementById('video');
  const canvas  = document.getElementById('canvas');
  const status  = document.getElementById('status-box');
  const btn     = document.getElementById('btn-capture');

  // Start camera
  navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } })
    .then(stream => {
      video.srcObject = stream;
      video.onloadedmetadata = () => {
        btn.disabled = false;
        status.textContent = '✅ Camera ready — position your face in the circle';
      };
    })
    .catch(err => {
      status.textContent = '❌ Camera access denied. Please allow camera permissions.';
    });

  async function capture() {
    btn.disabled = true;
    status.textContent = '🔍 Analysing face...';

    // Draw frame to canvas
    canvas.width  = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);

    canvas.toBlob(async (blob) => {
      const formData = new FormData();
      formData.append('image', blob, 'capture.jpg');

      try {
        const res  = await fetch('/api/face-clock', { method: 'POST', body: formData });
        const data = await res.json();

        if (data.ok) {
          status.innerHTML = `✅ <strong>${data.name}</strong> — ${data.action} at ${data.time}`;
          status.style.color = '#4ADE80';
          setTimeout(() => { window.location.href = '/dashboard'; }, 2000);
        } else {
          status.innerHTML = `❌ ${data.error}`;
          status.style.color = '#F87171';
          btn.disabled = false;
        }
      } catch (e) {
        status.textContent = '❌ Network error. Please try again.';
        btn.disabled = false;
      }
    }, 'image/jpeg', 0.9);
  }
</script>
{% endblock %}
